repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Note: uses system-installed gitleaks binary (language: system) because the
  # remote hook requires Go 1.24+ to build from source. Install gitleaks manually:
  #   macOS:  brew install gitleaks
  #   Linux:  https://github.com/gitleaks/gitleaks/releases
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        description: Detect secrets using gitleaks
        language: system
        entry: gitleaks protect --staged --redact --no-banner
        pass_filenames: false
